<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>AI MASTER PRO</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 20px; width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #252525; border: 1px solid #444; border-radius: 10px; color: white; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h1>AI MASTER PRO</h1>
    <input type="text" id="url" placeholder="ভিডিও লিঙ্ক দিন...">
    <button onclick="send()">এডিটিং শুরু করুন</button>
</div>
<script>
async function send() {
    const url = document.getElementById('url').value;
    const res = await fetch('/process', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({url: url}) });
    const data = await res.json();
    alert(data.message);
}
</script>
</body>
</html>
