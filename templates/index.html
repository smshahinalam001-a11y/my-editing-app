<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Master Video Editor</title>
    <style>
        :root { --primary: #00ff88; --bg: #121212; --card: #1e1e1e; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--card); width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-size: 22px; text-transform: uppercase; }
        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #aaa; }
        input[type="text"] { width: 100%; padding: 12px; background: #252525; border: 1px solid #444; border-radius: 10px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 12px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>AI MASTER PRO</h2>
    <div class="group">
        <label>ভিডিও ফাইল বা লিংক:</label>
        <input type="text" id="videoUrl" placeholder="লিংক এখানে দিন...">
    </div>
    <button onclick="alert('এডিটিং ইঞ্জিন কানেক্ট করা হচ্ছে...')">এডিটিং শুরু করুন</button>
</div>
</body>
</html>
